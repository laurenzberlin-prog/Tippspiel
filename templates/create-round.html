{% extends "base.html" %}

{% block title %}Tipprunde erstellen{% endblock %}

{% block content %}
<section class="card">
    <h2> Neues Tippspiel erstellen</h2>

{% if error %}
    <p style="color: red;">{{ error }}</p>

{% endif %}

    <form  method="POST">
        <label for="round_name">Name des Tippspiels:</label><br>
        <input type="text" id="round_name" name="round_name" placeholder="z.B. Büro-Tippspiel"required><br><br>

        <label for="description">Beschreibung:</label><br>
        <input type="text" id="description" name="description" placeholder="z.B. Sportart, Rewards" required><br><br>

        <button type="submit" class="button">Erstellen</button>

    <p><a href="/dashboard" class="button">Zurück </a></p>
        </form>
</section>
{% endblock %}
